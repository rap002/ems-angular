<div class="table-container">

  <div class="table-header">

    <h2>Projects</h2>

    <div class="header-actions">

      <input
        type="text"
        [(ngModel)]="searchText"
        (input)="onSearch()"
        placeholder="Search project"
        class="search-input"
      />

      <!-- FIXED ROUTE -->
      <button
        routerLink="/projects/add"
        class="btn btn-primary"
      >
        Create Project
      </button>

    </div>

  </div>

  <!-- <div *ngIf="loading">
    Loading projects...
  </div> -->

  <div *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <table *ngIf=" filteredProjects().length > 0">

    <thead>

      <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let project of filteredProjects()">

        <td>{{ project.name }}</td>

        <td>{{ project.description }}</td>

        <td class="actions-inline">
          <button
            class="btn btn-view"
            [disabled]="!getProjectId(project)"
            (click)="viewProject(getProjectId(project))"
          >
            View
          </button>
          <button
            class="btn btn-edit"
            [disabled]="!getProjectId(project)"
            (click)="editProject(getProjectId(project))"
          >
            Edit
          </button>
          <button
            class="btn btn-delete"
            [disabled]="!getProjectId(project)"
            (click)="deleteProject(getProjectId(project))"
          >
            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
