<div class="project-add-container">
  <div class="project-add-card">
    <h2>Add New Project</h2>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Project Name <span class="required">*</span></label>
        <input
          type="text"
          id="name"
          formControlName="name"
          class="form-control"
          placeholder="Enter project name"
        />
        <div *ngIf="name?.invalid && name?.touched" class="error-message">
          <span *ngIf="name?.errors?.['required']">Project name is required</span>
          <span *ngIf="name?.errors?.['minlength']">Minimum 3 characters required</span>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description <span class="required">*</span></label>
        <textarea
          id="description"
          formControlName="description"
          class="form-control"
          rows="4"
          placeholder="Enter project description"
        ></textarea>
        <div *ngIf="description?.invalid && description?.touched" class="error-message">
          <span *ngIf="description?.errors?.['required']">Description is required</span>
          <span *ngIf="description?.errors?.['minlength']">Minimum 10 characters required</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="startDate">Start Date <span class="required">*</span></label>
          <input
            type="date"
            id="startDate"
            formControlName="startDate"
            class="form-control"
          />
          <div *ngIf="startDate?.invalid && startDate?.touched" class="error-message">
            Start date is required
          </div>
        </div>

        <div class="form-group">
          <label for="endDate">End Date <span class="required">*</span></label>
          <input
            type="date"
            id="endDate"
            formControlName="endDate"
            class="form-control"
          />
          <div *ngIf="endDate?.invalid && endDate?.touched" class="error-message">
            End date is required
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="status">Status <span class="required">*</span></label>
        <select id="status" formControlName="status" class="form-control">
          <option value="PLANNED">Planned</option>
          <option value="ACTIVE">Active</option>
          <option value="ON_HOLD">On Hold</option>
          <option value="COMPLETED">Completed</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
      </div>

      <div class="button-group">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="isLoading || projectForm.invalid"
        >
          <span *ngIf="!isLoading">Add Project</span>
          <span *ngIf="isLoading">Adding...</span>
        </button>
        <button type="button" class="btn btn-secondary" (click)="onReset()">
          Reset
        </button>
        <button type="button" class="btn btn-outline" (click)="onCancel()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
