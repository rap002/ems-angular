<div class="department-add-container">
  <div class="header">
    <h1>{{ isEditMode ? 'Edit Department' : 'Add Department' }}</h1>
    <p class="subtitle">
      {{ isEditMode ? 'Update department information' : 'Create a new company department' }}
    </p>
  </div>

  <div class="form-card">
    <form (ngSubmit)="addDepartment()" #departmentForm="ngForm">
      <div *ngIf="error()" class="error">
        {{ error() }}
      </div>

      <div *ngIf="success()" class="success">
        {{ success() }}
      </div>

      <div class="form-group">
        <label for="name">Department Name</label>
        <input
          id="name"
          name="name"
          type="text"
          [(ngModel)]="name"
          placeholder="Enter department name"
          required
        />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          [(ngModel)]="description"
          placeholder="Enter department description"
          rows="5"
          required
        ></textarea>
      </div>

      <div class="actions">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading()"
        >
          {{
            loading()
              ? (isEditMode ? 'Updating...' : 'Adding...')
              : (isEditMode ? 'Update Department' : 'Add Department')
          }}
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          (click)="resetForm()"
          [disabled]="loading()"
        >
          Reset
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancel()"
          [disabled]="loading()"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
