<div class="form-container">
  <div class="card">
    <div class="form-header">
      <h2>{{ isEditMode() ? 'Edit Role' : 'Create New Role' }}</h2>
      <p>Configure organizational job role and hierarchy</p>
    </div>

    <form [formGroup]="roleForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Role Name</label>
          <input id="name" type="text" formControlName="name" placeholder="e.g. Senior Software Engineer">
          <div class="error-msg" *ngIf="roleForm.get('name')?.touched && roleForm.get('name')?.invalid">
            Name is required (min 2 chars)
          </div>
        </div>

        <div class="form-group">
          <label for="level">Hierarchy Level</label>
          <input id="level" type="number" formControlName="level" min="1" max="20">
          <div class="error-msg" *ngIf="roleForm.get('level')?.touched && roleForm.get('level')?.invalid">
            Level must be between 1 and 20
          </div>
        </div>

        <div class="form-group full-width">
          <label for="description">Description</label>
          <textarea id="description" formControlName="description" rows="3" placeholder="Describe the responsibilities of this role..."></textarea>
        </div>
      </div>

      <div *ngIf="error()" class="error-alert">{{ error() }}</div>

      <div class="form-actions">
        <button type="button" routerLink="/roles" class="btn-cancel">Cancel</button>
        <button type="submit" [disabled]="roleForm.invalid || loading()" class="btn-submit">
          {{ loading() ? 'Saving...' : (isEditMode() ? 'Update Role' : 'Create Role') }}
        </button>
      </div>
    </form>
  </div>
</div>
