<div class="role-container">
  <div class="header-section">
    <div class="title-area">
      <h1>Job Roles</h1>
      <p class="subtitle">Manage organization roles and hierarchy levels</p>
    </div>
    <div class="header-actions" *ngIf="isAdmin()">
      <button routerLink="/roles/add" class="btn btn-primary">
        <span class="icon">+</span> Add New Role
      </button>
    </div>
  </div>

  <div *ngIf="loading()" class="loading">
    <div class="spinner"></div>
    <p>Loading roles...</p>
  </div>

  <div *ngIf="error()" class="error">{{ error() }}</div>

  <div class="card" *ngIf="!loading() && !error()">
    <div class="table-responsive">
      <table class="role-table">
        <thead>
          <tr>
            <th>Role Name</th>
            <th>Description</th>
            <th>Level</th>
            <th *ngIf="isAdmin()">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let role of roles()">
            <td>
              <div class="role-name-cell">
                <span class="role-badge">R</span>
                {{ role.name }}
              </div>
            </td>
            <td>{{ role.description }}</td>
            <td>
              <span class="level-badge">Level {{ role.level }}</span>
            </td>
            <td *ngIf="isAdmin()">
              <div class="action-buttons">
                <button [routerLink]="['/roles/edit', role.id]" class="action-btn edit-btn">Edit</button>
                <button (click)="deleteRole(role.id)" class="action-btn delete-btn">Delete</button>
              </div>
            </td>
          </tr>
          <tr *ngIf="roles().length === 0">
            <td colspan="4" class="empty-state">No roles found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
