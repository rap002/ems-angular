# ============================================================
# DEV PROFILE - application-dev.properties
# Activate with: spring.profiles.active=dev
# ============================================================

# MongoDB - dev override (optional, inherits from application.properties)
# spring.data.mongodb.uri=mongodb://localhost:27017/ems_db_dev

# Verbose security logging - dev only
logging.level.com.ibm.ems=DEBUG
logging.level.org.springframework.security=INFO

# JWT secret for dev
jwt.secret=${JWT_SECRET}

# Actuator - slightly more endpoints in dev
management.endpoints.web.exposure.include=health,info,metrics,loggers
