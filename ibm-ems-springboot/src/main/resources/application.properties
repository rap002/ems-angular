# ===================================
# IBM EMS - Application Configuration
# ===================================

# --- credentials (only demo, don't write here) ---
app.security.admin.username=hr.admin
app.security.admin.password=Admin@IBM123
app.security.user.username=emp.user
app.security.user.password=User@IBM123

# --- Profile ---
spring.profiles.active=dev

# --- Server ---
server.port=8080

# --- Application Info ---
ems.app.name=IBM Employee Management System
ems.app.version=1.0.0

info.app.name=IBM EMS API
info.app.version=1.0.0
info.app.description=Employee Management System REST API

# --- MongoDB ---
spring.data.mongodb.uri=mongodb://localhost:27017/ems_db
spring.data.mongodb.auto-index-creation=true

# --- Disable JPA auto-configuration ---
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# --- JWT ---
jwt.secret=ffi8Jq90OKwwB1717YFqJTgSSJ6wKoLo
jwt.expiration.ms=3600000

# --- Actuator (RESTRICTED) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# --- Logging ---
logging.level.root=WARN
logging.level.com.ibm.ems=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/ibm-ems.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- OpenAPI / Swagger ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Security Misc ---
spring.mvc.hiddenmethod.filter.enabled=false
