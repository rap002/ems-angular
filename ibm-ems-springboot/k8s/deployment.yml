apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibm-ems
  namespace: default
  labels:
    app: ibm-ems
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ibm-ems
  template:
    metadata:
      labels:
        app: ibm-ems
    spec:
      containers:
        - name: ibm-ems
          image: ibm-ems:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: jwt-secret
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: db-url
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ibm-ems-service
  namespace: default
spec:
  selector:
    app: ibm-ems
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
