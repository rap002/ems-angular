# =============================================================================
# IBM EMS - Docker Compose (MongoDB)
# Usage:
#   cp .env.example .env
#   docker compose up -d
# =============================================================================
services:

  ems:
    image: ibm-ems:latest
    container_name: ibm-ems
    ports:
      - "8080:8080"
    env_file:
      - .ems.env
    # environment:
    #   - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
    #   - JWT_SECRET=${JWT_SECRET}
    #   - MONGO_URI=mongodb://mongodb:27017/ems_db
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ems-network

  mongodb:
    image: mongo:7.0
    container_name: ibm-ems-mongodb
    environment:
      MONGO_INITDB_DATABASE: ems_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ems-network
  frontend:
    image: ibm-angular:latest
    container_name: ems-frontend
    # env_file:
    #   - .angular.env
    ports:
      - "4000:4000"
    networks:
      - ems-network

networks:
  ems-network:
    driver: bridge

volumes:
  mongo_data:
